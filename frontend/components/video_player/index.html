<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: sans-serif;
        }
        .player-container {
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <video id="player" controls preload="metadata"></video>
    </div>

    <script>
        // Прямое общение с родителем через postMessage по протоколу Streamlit,
        // чтобы не зависеть от внешней библиотеки streamlit-component-lib (она не публикуется как CDN-файл).
        const video = document.getElementById("player");
        let currentUrl = "";
        let lastHeight = 0;

        function sendMessage(type, data) {
            const payload = Object.assign({ isStreamlitMessage: true, type: type }, data || {});
            window.parent.postMessage(payload, "*");
        }

        function setFrameHeight() {
            // Высота iframe подгоняется под содержимое (видео + контролы)
            const h = document.body.scrollHeight;
            if (h !== lastHeight) {
                lastHeight = h;
                sendMessage("streamlit:setFrameHeight", { height: h });
            }
        }

        function sendState() {
            sendMessage("streamlit:setComponentValue", {
                value: {
                    currentTime: video.currentTime,
                    playing: !video.paused,
                    duration: isFinite(video.duration) ? video.duration : 0,
                },
                dataType: "json",
            });
        }

        function onRender(data) {
            // Streamlit отдаёт args в data.args
            const args = (data && data.args) || {};
            const url = args.url || "";

            // Обновление src только при смене URL (иначе каждый rerun перезагружал бы видео)
            if (url && url !== currentUrl) {
                currentUrl = url;
                video.src = url;
                video.load();
            }
            setFrameHeight();
        }

        // Важно: sendState НЕ вешается на timeupdate — он срабатывает ~4 раза в секунду,
        // каждый вызов триггерит rerun Streamlit, и интерфейс начинает задыхаться.
        // Вместо этого отправляем состояние только на значимых событиях + раз в N секунд.
        // Интерполяция currentTime между отправками делается на стороне Python по wall-clock.
        video.addEventListener("play", sendState);
        video.addEventListener("pause", sendState);
        video.addEventListener("seeked", sendState);
        video.addEventListener("loadedmetadata", () => {
            setFrameHeight();
            sendState();
        });
        // Периодическая ресинхронизация (каждые 5 секунд — редко, но достаточно)
        setInterval(() => {
            if (!video.paused) sendState();
        }, 5000);

        window.addEventListener("message", (event) => {
            const data = event.data;
            if (!data || typeof data.type !== "string") return;
            if (data.type === "streamlit:render") {
                onRender(data);
            }
        });

        // Сообщение готовности — Streamlit ждёт его, иначе показывает "trouble loading"
        sendMessage("streamlit:componentReady", { apiVersion: 1 });
        setFrameHeight();

        // Страховка по высоте при динамической смене размера
        window.addEventListener("resize", setFrameHeight);
        setInterval(setFrameHeight, 1000);
    </script>
</body>
</html>
